version: '3.8'

services:
  golem:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: golem-core
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    volumes:
      # Persistence for memory and logs (Map to the app's internal paths)
      - ./golem_memory:/app/golem_memory
      - ./logs:/app/logs
      # Optional: Mount .env to allow configuration changes without rebuild
      # Using a relative path that works across environments
      - ./.env:/app/.env:ro
    environment:
      - ENABLE_WEB_DASHBOARD=true
      - NODE_ENV=production
      - PLAYWRIGHT_HEADLESS=true
      - DASHBOARD_PORT=3000
      # Use host values if provided, otherwise leave empty
      - PLAYWRIGHT_REMOTE_DEBUGGING_PORT=${PLAYWRIGHT_REMOTE_DEBUGGING_PORT:-}
      - HOST_PROJECT_DIR=${PWD}
    # TTY and Stdin are useful for interactive sessions or maintaining terminal-based processes
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - golem-net

networks:
  golem-net:
    driver: bridge
